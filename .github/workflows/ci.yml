name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  check:
    name: Typecheck and lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
        env:
          NPM_CONFIG_PRODUCTION: 'false'
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Next.js lint
        run: npx next lint
